name: Deploy Superset to ECS

on:
  push:
    branches: [main]
    paths:
      - "superset/**"
      - "superset-frontend/**"
      - "deployment/**"
      - "requirements/**"
      - ".github/workflows/deploy-ecs.yml"

  workflow_dispatch: # Allow manual trigger from GitHub UI

concurrency:
  group: deploy-ecs
  cancel-in-progress: false # Never cancel an in-progress deploy

permissions:
  id-token: write # For OIDC auth with AWS
  contents: read

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-2' }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: deployment/cdk/package-lock.json

      - name: Install CDK dependencies
        working-directory: deployment/cdk
        run: npm ci

      - name: CDK deploy (ECS stack only)
        working-directory: deployment/cdk
        run: |
          npx cdk deploy SupersetEcs \
            --require-approval never \
            -c cognitoDomain=${{ secrets.COGNITO_DOMAIN }} \
            -c cognitoClientId=${{ secrets.COGNITO_CLIENT_ID }} \
            -c cognitoUserPoolId=${{ secrets.COGNITO_USER_POOL_ID }} \
            -c cognitoRegion=${{ vars.AWS_REGION || 'us-east-2' }} \
            -c supersetPublicUrl=${{ secrets.SUPERSET_PUBLIC_URL }} \
            -c cloudfrontPrefixListId=${{ vars.CLOUDFRONT_PREFIX_LIST_ID || 'pl-b6a144df' }} \
            -c snowflakeAccount=${{ secrets.SNOWFLAKE_ACCOUNT }} \
            -c snowflakeUser=${{ secrets.SNOWFLAKE_USER }} \
            -c snowflakeDatabase=${{ secrets.SNOWFLAKE_DATABASE }} \
            -c snowflakeSchema=${{ secrets.SNOWFLAKE_SCHEMA || 'PUBLIC' }} \
            -c snowflakeWarehouse=${{ secrets.SNOWFLAKE_WAREHOUSE }} \
            -c snowflakeRole=${{ secrets.SNOWFLAKE_ROLE }} \
            -c snowflakePrivateKey="$(echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" | base64 -w 0)"

      - name: Run database migrations
        run: |
          set +e  # Don't exit immediately on failure

          CLUSTER_NAME=$(aws ecs list-clusters --query "clusterArns[?contains(@, 'SupersetCluster')]" --output text | head -1)
          CLUSTER_NAME=$(basename "$CLUSTER_NAME")
          echo "Cluster: $CLUSTER_NAME"

          # List all task definitions in the stack to help debug naming
          echo "All SupersetEcs task definitions:"
          aws ecs list-task-definitions --family-prefix SupersetEcs --sort DESC --output text

          # CDK generates family names like "SupersetEcsInitTaskDef<HASH>" (no hyphens)
          # Use a broader match then filter, with fallback to exact family listing
          TASK_DEF=$(aws ecs list-task-definitions --family-prefix SupersetEcs --sort DESC \
            --query "taskDefinitionArns[?contains(@, 'InitTaskDef')]" --output text | head -1)

          # Fallback: if JMESPath filter returned empty, try case-insensitive match
          if [ -z "$TASK_DEF" ] || [ "$TASK_DEF" = "None" ]; then
            echo "InitTaskDef not found with family-prefix SupersetEcs, trying broader search..."
            TASK_DEF=$(aws ecs list-task-definitions --sort DESC \
              --query "taskDefinitionArns[?contains(@, 'Init')]" --output text | head -1)
          fi

          if [ -z "$TASK_DEF" ] || [ "$TASK_DEF" = "None" ]; then
            echo "ERROR: Could not find init task definition. CDK may not have registered it yet."
            echo "Available task definition families:"
            aws ecs list-task-definition-families --status ACTIVE --output text
            exit 1
          fi

          echo "Task Definition: $TASK_DEF"

          SUBNETS=$(aws ec2 describe-subnets \
            --filters "Name=tag:aws-cdk:subnet-name,Values=Private" \
            --query "Subnets[].SubnetId" --output text | tr '\t' ',')
          echo "Subnets: $SUBNETS"

          SG=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=*EcsSg*" \
            --query "SecurityGroups[0].GroupId" --output text)
          echo "Security Group: $SG"

          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER_NAME" \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG]}" \
            --query "tasks[0].taskArn" --output text)

          if [ $? -ne 0 ] || [ -z "$TASK_ARN" ] || [ "$TASK_ARN" = "None" ]; then
            echo "ERROR: Failed to start migration task"
            exit 1
          fi

          echo "Migration task started: $TASK_ARN"
          echo "Check CloudWatch logs at /ecs/superset/init"
